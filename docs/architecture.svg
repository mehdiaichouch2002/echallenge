<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="720" viewBox="0 0 1000 720" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1000" height="720" fill="#ffffff"/>
  <text x="500" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">Architecture technique — EChallenge (Spring Boot)</text>

  <!-- Client layer -->
  <rect x="80" y="70" width="600" height="90" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="380" y="100" text-anchor="middle" font-size="17" font-weight="bold" fill="#1e40af">Couche Présentation — Front-end React (Vite)</text>
  <text x="380" y="126" text-anchor="middle" font-size="13" fill="#334155">Pages Admin (CRUD) · Pages Candidat (inscription, examen, résultats) · react-router · axios (JWT)</text>
  <text x="380" y="146" text-anchor="middle" font-size="12" fill="#64748b">http://localhost:5173</text>

  <!-- HTTP arrow -->
  <line x1="380" y1="160" x2="380" y2="215" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="395" y="192" font-size="12" fill="#334155">HTTP / JSON (REST) — Authorization: Bearer &lt;JWT&gt;</text>

  <!-- Spring Boot box -->
  <rect x="60" y="220" width="640" height="360" rx="12" fill="#f8fafc" stroke="#0f172a" stroke-width="2"/>
  <text x="380" y="248" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">Application Spring Boot — http://localhost:8090</text>

  <!-- Web layer -->
  <rect x="100" y="265" width="560" height="70" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="380" y="292" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e40af">Couche Web — Spring MVC (@RestController)</text>
  <text x="380" y="315" text-anchor="middle" font-size="12" fill="#334155">AuthController · Admin*Controllers · CandidateAreaController · GlobalExceptionHandler · DTOs</text>

  <line x1="380" y1="335" x2="380" y2="360" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Service layer -->
  <rect x="100" y="365" width="560" height="70" rx="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="380" y="392" text-anchor="middle" font-size="14" font-weight="bold" fill="#166534">Couche Métier — Interfaces + Implémentations (@Service, @Transactional)</text>
  <text x="380" y="415" text-anchor="middle" font-size="12" fill="#334155">AuthService · ThemeService · QuestionService · TestService · TestSessionService · ResultService…</text>

  <line x1="380" y1="435" x2="380" y2="460" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DAO layer -->
  <rect x="100" y="465" width="560" height="70" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="380" y="492" text-anchor="middle" font-size="14" font-weight="bold" fill="#854d0e">Couche DAO — Spring Data JPA (JpaRepository)</text>
  <text x="380" y="515" text-anchor="middle" font-size="12" fill="#334155">UserRepository · ThemeRepository · QuestionRepository · TestRepository · ResultRepository…</text>

  <text x="380" y="562" text-anchor="middle" font-size="12" fill="#64748b">Entités JPA (Hibernate) : User, Candidate, Theme, Question, Test, TimeSlot, TestSession, Result…</text>

  <!-- DB -->
  <line x1="380" y1="580" x2="380" y2="620" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="395" y="605" font-size="12" fill="#334155">JDBC (HikariCP)</text>
  <path d="M 280 630 a 100 14 0 0 0 200 0 v 50 a 100 14 0 0 1 -200 0 z" fill="#e0e7ff" stroke="#4338ca" stroke-width="2"/>
  <ellipse cx="380" cy="630" rx="100" ry="14" fill="#c7d2fe" stroke="#4338ca" stroke-width="2"/>
  <text x="380" y="665" text-anchor="middle" font-size="14" font-weight="bold" fill="#3730a3">MySQL 8 (Docker)</text>
  <text x="380" y="683" text-anchor="middle" font-size="11" fill="#4338ca">base « echallenge » — port 3307</text>

  <!-- Security cross-cutting -->
  <rect x="740" y="220" width="220" height="360" rx="12" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="850" y="250" text-anchor="middle" font-size="15" font-weight="bold" fill="#991b1b">Spring Security 6</text>
  <text x="850" y="285" text-anchor="middle" font-size="12" fill="#7f1d1d">SecurityFilterChain (stateless)</text>
  <text x="850" y="310" text-anchor="middle" font-size="12" fill="#7f1d1d">JwtAuthFilter (Bearer JWT)</text>
  <text x="850" y="335" text-anchor="middle" font-size="12" fill="#7f1d1d">UserDetailsService (BDD)</text>
  <text x="850" y="360" text-anchor="middle" font-size="12" fill="#7f1d1d">BCryptPasswordEncoder</text>
  <text x="850" y="395" text-anchor="middle" font-size="12" font-weight="bold" fill="#991b1b">Règles d'accès :</text>
  <text x="850" y="418" text-anchor="middle" font-size="11" fill="#7f1d1d">/api/auth/** -> public</text>
  <text x="850" y="438" text-anchor="middle" font-size="11" fill="#7f1d1d">GET /api/tests, /api/themes -> public</text>
  <text x="850" y="458" text-anchor="middle" font-size="11" fill="#7f1d1d">/api/admin/** -> rôle ADMIN</text>
  <text x="850" y="478" text-anchor="middle" font-size="11" fill="#7f1d1d">/api/candidate/** -> rôle CANDIDATE</text>
  <text x="850" y="513" text-anchor="middle" font-size="12" fill="#7f1d1d">JWT signé HS256</text>
  <text x="850" y="533" text-anchor="middle" font-size="12" fill="#7f1d1d">(sub=email, role, userId)</text>
  <line x1="740" y1="300" x2="705" y2="300" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="850" y="568" text-anchor="middle" font-size="11" font-style="italic" fill="#991b1b">Sécurité transversale (filtre avant la couche Web)</text>
</svg>
