spring.application.name=echallenge-backend
server.port=8090

# --- Encodage UTF-8 (réponses HTTP + connexion MySQL) ---
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# --- Datasource (MySQL via docker-compose, host port 3307) ---
spring.datasource.url=jdbc:mysql://localhost:3307/echallenge?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=echallenge
spring.datasource.password=echallenge
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- JWT ---
app.jwt.secret=Y2hhbmdlLW1lLWluLXByb2QtZWNoYWxsZW5nZS1zZWNyZXQta2V5LTI1Ng==
app.jwt.expiration-ms=86400000
