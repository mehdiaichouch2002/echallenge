services:
  mysql:
    image: mysql:8.0
    container_name: echallenge-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: echallenge
      MYSQL_USER: echallenge
      MYSQL_PASSWORD: echallenge
    ports:
      - "3307:3306"
    volumes:
      - echallenge_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  echallenge_mysql_data:
